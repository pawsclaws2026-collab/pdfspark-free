<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JPG a PDF</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body { font-family: Arial; text-align: center; padding: 40px; }
button { padding: 10px 20px; background: #0d47a1; color: #fff; border: none; cursor: pointer; }
</style>
</head>
<body>

<h2>Convertir JPG a PDF</h2>

<input type="file" id="images" multiple accept="image/jpeg">
<br><br>
<button onclick="convert()">Convertir</button>

<script>
async function convert() {
  const files = document.getElementById('images').files;
  if (!files.length) return alert('Selecciona imágenes');

  const pdfDoc = await PDFLib.PDFDocument.create();

  for (let file of files) {
    const bytes = await file.arrayBuffer();
    const image = await pdfDoc.embedJpg(bytes);
    const page = pdfDoc.addPage([image.width, image.height]);
    page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
  }

  const pdfBytes = await pdfDoc.save();
  const blob = new Blob([pdfBytes], { type: 'application/pdf' });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'imagenes.pdf';
  a.click();
}
</script>

</body>
</html>
